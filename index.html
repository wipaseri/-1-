<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サブスク迷子救済ガチャ</title>
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>

    <div class="container">
        <h1>🎬 サブスク迷子救済ガチャ</h1>

        <div class="section">
            <div class="section-title">1. 登録しているサブスクを選んでください（複数可）</div>
            <div class="checkbox-group" id="providers">
                <input type="checkbox" id="p119" value="119" checked>
                <label for="p119" class="has-logo"><img src="/src/assets/logos/amazon.jpg" alt="Amazon Prime" title="Amazon Prime" class="provider-logo-icon"></label>
                <input type="checkbox" id="p8" value="8" checked>
                <label for="p8" class="has-logo"><img src="/src/assets/logos/netflix.jpg" alt="Netflix" title="Netflix" class="provider-logo-icon"></label>
                <input type="checkbox" id="p84" value="84">
                <label for="p84" class="has-logo"><img src="/src/assets/logos/unext.jpg" alt="U-NEXT" title="U-NEXT" class="provider-logo-icon"></label>
                <input type="checkbox" id="p356" value="356">
                <label for="p356" class="has-logo"><img src="/src/assets/logos/hulu.jpg" alt="Hulu" title="Hulu" class="provider-logo-icon"></label>
                <input type="checkbox" id="p337" value="337">
                <label for="p337" class="has-logo"><img src="/src/assets/logos/disney.jpg" alt="Disney+" title="Disney+" class="provider-logo-icon"></label>
                <input type="checkbox" id="p85" value="85">
                <label for="p85" class="has-logo"><img src="/src/assets/logos/danime.jpg" alt="dアニメストア" title="dアニメストア" class="provider-logo-icon"></label>
            </div>
        </div>

        <div class="section">
            <div class="section-title">2. 今の気分を教えてください</div>
            <select id="mood-energy">
                <option value="movie">体力あり（映画2時間いける！）</option>
                <option value="tv">体力なし（アニメやドラマを1話だけ…）</option>
            </select>
            <select id="mood-genre">
                <option value="">ジャンルを選択...</option>
                <option value="35">笑いたい（コメディ）</option>
                <option value="18">泣きたい・感動したい（ドラマ）</option>
                <option value="28">ハラハラしたい（アクション）</option>
                <option value="16">何も考えずに見たい（アニメ）</option>
                <option value="27">背筋を凍らせたい（ホラー）</option>
                <option value="878">頭を使いたい（SF）</option>
                <option value="14">ファンタジーの世界に浸りたい</option>
                <option value="80">犯罪・陰謀のストーリーが好き</option>
                <option value="53">サスペンス・スリラーでドキドキ</option>
                <option value="10749">恋愛ものが見たい（ロマンス）</option>
                <option value="9648">謎解きが好き（ミステリー）</option>
                <option value="12">冒険ものが好き（アドベンチャー）</option>
                <option value="36">歴史ものが見たい</option>
                <option value="10751">家族で見られるもの（ファミリー）</option>
                <option value="10402">音楽・歌が好き（ミュージカル）</option>
                <option value="99">ドキュメンタリーで学びたい</option>
                <option value="10752">戦争・冒険のダイナミックな作品</option>
            </select>
            <!-- FIX #2: 任意選択に変更（選択しなくてもガチャを回せる） -->
            <select id="mood-vibe">
                <option value="">気分タイプ（任意）</option>
                <option value="romantic">ロマンチック気分 💕</option>
                <option value="intense">興奮・サスペンス気分 ⚡</option>
                <option value="thoughtful">深く考えさせられたい 🤔</option>
                <option value="relaxing">ゆったり・のんびり 😌</option>
                <option value="adventurous">冒険心をくすぐられたい 🗺️</option>
                <option value="dark">ダークな世界観に浸りたい 🌙</option>
            </select>
            <select id="mood-filter">
                <option value="">フィルタを選択...</option>
                <option value="popularity">人気作品を見たい（人気順）</option>
                <option value="vote_average">評価が高い作品のみ（高評価順）</option>
                <option value="release_date">最新作を見たい（新作順）</option>
                <option value="random">とにかくおまかせ（ランダム）</option>
            </select>
        </div>

        <button class="btn" id="gacha-btn">ガチャを回す！</button>
        <div id="loading" class="loading">作品を厳選中... 🤔</div>

        <div id="result">
            <!-- FIX #7: src="" を削除してページロード時の余分なリクエストを防止 -->
            <img id="res-poster" class="poster" alt="ポスター画像" style="display:none">
            <!-- FIX #2: 気分タイプのラベルを表示するエリア -->
            <div id="res-vibe" class="vibe-badge"></div>
            <div id="res-title" class="movie-title"></div>
            <div id="res-info" class="movie-info"></div>
            <div id="res-overview" class="movie-overview"></div>
            <!-- 視聴リンク: 配信サービスへのリンクボタンを JS で描画 -->
            <div id="res-watch-links"></div>
            <!-- 予告映像: YouTube 埋め込みトグルを JS で描画 -->
            <div id="res-trailer"></div>
        </div>

        <div class="tmdb-credit">
            ※この製品はTMDb APIを使用していますが、TMDbによって承認または認定されていません。
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>

</body>

</html>
